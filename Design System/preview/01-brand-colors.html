<!doctype html>
<!-- @dsCard group="Colors" name="Brand colors" subtitle="Boltz Yellow & Boltz Blue — canonical swatches" viewport="700x200" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="swatch">
      <div class="chip" style="background: #E6C826; border-color: transparent;"></div>
      <div class="name">Boltz Yellow</div>
      <div class="hex">#E6C826</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: #081E36; border-color: var(--color-white-15);"></div>
      <div class="name">Boltz Blue</div>
      <div class="hex">#081E36</div>
    </div>
  </div>
  <div class="muted" style="font-size: 12px; line-height: 1.5;">
    Canonical brand swatches — stakeholder-provided. The runtime palette derives
    secondary navys and the primary yellow from these.
  </div>
</div></body></html>
