<!doctype html>
<!-- @dsCard group="Brand" name="Lightning mark & circle logos" subtitle="Animated `boltzing` loading mark + circle avatars" viewport="700x240" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
@keyframes boltzing {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}
.bolt-anim { animation: boltzing 3s infinite ease-in-out; transform-origin: center; }
</style></head>
<body><div class="card">
  <div class="card-row" style="gap: 30px; align-items: center;">
    <div style="width: 96px; height: 96px; display:flex; align-items:center; justify-content:center; background: var(--color-secondary-600); border-radius: 16px;">
      <img class="bolt-anim" src="../assets/boltz-icon.svg" style="width: 54px; height: 54px;" alt="">
    </div>
    <div>
      <div style="font-weight: 700; color: var(--color-text); font-size: 16px;">Loading mark</div>
      <div class="muted" style="font-size: 12px; max-width: 380px; line-height: 1.5;">The lightning bolt is the *only* element that animates ambiently. <span class="mono">@keyframes boltzing</span> — scale 1 → 1.1 → 1, 3s, infinite. Use on any loading state.</div>
    </div>
  </div>
  <div class="card-row" style="gap: 18px; align-items: center; margin-top: 6px;">
    <img src="../assets/boltz-logo-circle.svg" style="width: 56px; height: 56px;" alt="">
    <img src="../assets/boltz-logo-circle-transparent.svg" style="width: 56px; height: 56px; background: var(--color-secondary-600); border-radius: 50%;" alt="">
    <img src="../assets/boltz-logo-circle-transparent-black.svg" style="width: 56px; height: 56px; background: #fff; border-radius: 50%;" alt="">
    <img src="../assets/boltz-pro-logo-circle.svg" style="width: 56px; height: 56px;" alt="">
    <span class="muted" style="font-size: 11px;">circle marks · solid · transparent-yellow · transparent-black · Pro</span>
  </div>
</div></body></html>
