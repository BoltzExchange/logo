<!doctype html>
<!-- @dsCard group="Spacing" name="Shadows & glows" subtitle="Card · ambient hero glow · link hover glow" viewport="700x200" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card" style="background: var(--color-secondary-600);">
  <div class="card-row" style="gap: 26px; flex-wrap: nowrap; align-items: stretch;">
    <div style="display:flex; flex-direction:column; gap:8px; flex: 1; min-width: 0;">
      <div style="height:100px; background: var(--color-secondary-900); border-radius: 12px; box-shadow: 2px 4px 10px var(--color-black-20); border: 1px solid var(--color-white-05);"></div>
      <div class="mono" style="font-size: 11px; color: var(--color-white-80);">card · 2px 4px 10px / black-20</div>
      <div class="muted" style="font-size: 10.5px;">flat surface, barely-there elevation</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; flex: 1; min-width: 0;">
      <div style="height:100px; background: var(--color-secondary-700); border-radius: 12px; box-shadow: 0 0 40px var(--color-primary-glow); border: 1px solid var(--color-white-15);"></div>
      <div class="mono" style="font-size: 11px; color: var(--color-white-80);">hero glow · 0 0 40px primary-glow</div>
      <div class="muted" style="font-size: 10.5px;">ambient yellow halo around the swap frame</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; flex: 1; min-width: 0;">
      <div style="height:100px; background: var(--color-secondary-900); border-radius: 12px; box-shadow: 0 0 12px var(--color-link); border: 1px solid var(--color-link);"></div>
      <div class="mono" style="font-size: 11px; color: var(--color-white-80);">card hover · 0 0 12px link</div>
      <div class="muted" style="font-size: 10.5px;">applied with scale(1.02) on product cards</div>
    </div>
  </div>
</div></body></html>
