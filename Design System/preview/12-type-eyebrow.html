<!doctype html>
<!-- @dsCard group="Type" name="Eyebrow & asset-code" subtitle="UPPERCASE labels + 550-weight asset codes" viewport="700x200" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items:start;">
    <div>
      <div class="label-upper">Eyebrow label · used inside inputs &amp; over sections</div>
      <div style="margin-top: 10px; font-size: 11px; font-weight:700; text-transform: uppercase; color: var(--color-white-60); letter-spacing: 0;">SEND</div>
      <div style="margin-top: 4px; font-size: 11px; font-weight:700; text-transform: uppercase; color: var(--color-white-60);">RECEIVE</div>
      <div style="margin-top: 4px; font-size: 11px; font-weight:700; text-transform: uppercase; color: var(--color-white-60);">INTEGRATIONS · PARTNERS</div>
    </div>
    <div>
      <div class="label-upper">Asset code · 14 / 550 / uppercase</div>
      <div style="display:flex; gap:14px; margin-top: 10px; align-items:center;">
        <span style="font-size: 14px; font-weight: 550; text-transform: uppercase;">BTC</span>
        <span style="font-size: 14px; font-weight: 550; text-transform: uppercase;">USDT</span>
        <span style="font-size: 14px; font-weight: 550; text-transform: uppercase;">LBTC</span>
        <span style="font-size: 14px; font-weight: 550; text-transform: uppercase;">RBTC</span>
      </div>
      <div class="muted" style="font-size: 11px; margin-top: 16px; font-style: italic;">weight 550 is non-standard but is what the codebase uses for asset-code chips. Noto Sans supports it.</div>
    </div>
  </div>
</div></body></html>
