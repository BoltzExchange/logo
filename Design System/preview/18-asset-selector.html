<!doctype html>
<!-- @dsCard group="Components" name="Asset & denomination pills" subtitle="42px asset pill, denomination segmented control" viewport="700x200" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.asset{display:inline-flex;align-items:center;gap:6px;height:42px;padding:2px 12px 2px 4px;background:var(--color-secondary-800);border:1px solid var(--color-white-15);border-radius:999rem;cursor:pointer;}
.asset img{width:34px;height:34px;}
.asset .code{font-size:.875rem;font-weight:550;text-transform:uppercase;color:var(--color-text);}
.asset .arrow{width:14px;height:14px;color:var(--color-white-80);}
.denom{display:inline-flex;gap:2px;padding:3px;border:1px solid var(--color-white-15);background:var(--color-secondary-800);border-radius:999rem;}
.denom button{font-size:14px;display:inline-flex;align-items:center;gap:8px;padding:.35rem .9rem;background:transparent;color:var(--color-white-50);cursor:pointer;border:1px solid transparent;font-family:inherit;}
.denom button:first-child{border-radius:999rem 0 0 999rem;}
.denom button:last-child{border-radius:0 999rem 999rem 0;}
.denom button.active{color:var(--color-text);background:var(--color-secondary-500);}
</style></head>
<body><div class="card">
  <div class="card-row" style="gap:12px; align-items:center;">
    <div class="asset">
      <img src="../assets/icons/bitcoin.svg" alt="">
      <span class="code">BTC</span>
      <svg class="arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l5 5 5-5"/></svg>
    </div>
    <div class="asset">
      <img src="../assets/icons/lightning.svg" alt="">
      <span class="code">LN</span>
      <svg class="arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l5 5 5-5"/></svg>
    </div>
    <div class="asset">
      <img src="../assets/icons/liquid.svg" alt="">
      <span class="code">LBTC</span>
      <svg class="arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l5 5 5-5"/></svg>
    </div>
    <div class="asset">
      <img src="../assets/icons/usdt.svg" alt="">
      <span class="code">USDT</span>
      <svg class="arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l5 5 5-5"/></svg>
    </div>
  </div>
  <div class="muted" style="font-size:11px;">asset selector pill · 42px tall · docked inside amount input</div>
  <div class="card-row" style="margin-top: 6px;">
    <div class="denom">
      <button class="active">BTC</button>
      <button>sats</button>
      <button>USD</button>
    </div>
    <span class="muted" style="font-size:11px;">denomination toggle · segmented pill</span>
  </div>
</div></body></html>
