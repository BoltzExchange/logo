<!doctype html>
<!-- @dsCard group="Colors" name="Chart, fee & terminal" subtitle="Fee chart palette + terminal accents + BTC orange" viewport="700x270" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div class="label-upper">Chart &amp; fee semantics — used in Pro fee charts</div>
  <div class="card-grid" style="grid-template-columns: repeat(6, 1fr);">
    <div class="swatch"><div class="chip" style="background: var(--color-chart-purple);"></div><div class="name">chart-purple</div><div class="hex">#A648B7</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-chart-green);"></div><div class="name">chart-green</div><div class="hex">#48B789</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-chart-blue);"></div><div class="name">chart-blue</div><div class="hex">#559CB6</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-regular-fee);"></div><div class="name">regular-fee</div><div class="hex">#C334DD</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-negative-fee);"></div><div class="name">negative-fee</div><div class="hex">#11C87C</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-lower-fee);"></div><div class="name">lower-fee</div><div class="hex">#23A7D7</div></div>
  </div>
  <div class="label-upper" style="margin-top:6px;">Terminal · used in code/log output</div>
  <div class="card-grid" style="grid-template-columns: repeat(6, 1fr);">
    <div class="swatch"><div class="chip" style="background: var(--color-terminal-green); height:40px;"></div><div class="name">terminal-green</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-terminal-blue); height:40px;"></div><div class="name">terminal-blue</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-terminal-cyan); height:40px;"></div><div class="name">terminal-cyan</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-btc-orange); height:40px;"></div><div class="name">btc-orange</div><div class="hex">#F7931A</div></div>
    <div style="grid-column: span 2;"></div>
  </div>
</div></body></html>
