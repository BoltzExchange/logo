<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary · hover · disabled, light/explorer/success/danger, btn-small" viewport="700x260" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.b {cursor:pointer;min-height:42px;padding:10px 14px;text-decoration:none;border-radius:12px;font-size:.875rem;font-weight:bold;line-height:1.2;border:none;display:inline-flex;justify-content:center;align-items:center;gap:.35rem;color:var(--color-secondary-700);background:var(--color-primary);}
.b-light{color:var(--color-text);background:var(--color-black-40);}
.b-explorer{background:var(--color-tertiary);color:var(--color-text);}
.b-success{background:var(--color-success-500);color:var(--color-text);}
.b-danger{background:var(--color-error-700);color:var(--color-text);}
.b-hover{background:var(--color-secondary-200);color:var(--color-secondary-700);}
.b-disabled{color:var(--color-secondary-600);background:var(--color-medium-gray);cursor:not-allowed;}
.b-small{min-height:24px;border-radius:8px;padding:3px 10px;font-size:12px;}
.b-active{background:var(--color-text);color:var(--color-secondary-700);}
</style></head>
<body><div class="card">
  <div class="card-row">
    <button class="b">Start Swapping</button>
    <button class="b b-hover">Start Swapping</button>
    <button class="b b-disabled">Start Swapping</button>
  </div>
  <div class="card-row" style="font-size:11px;color:var(--color-white-50);margin-top:-4px;">
    <span style="width:140px;">primary</span>
    <span style="width:140px;">primary · hover</span>
    <span style="width:140px;">primary · disabled</span>
  </div>
  <div class="card-row" style="margin-top:6px;">
    <button class="b b-light">Refund</button>
    <button class="b b-explorer">Open explorer</button>
    <button class="b b-success">Confirmed</button>
    <button class="b b-danger">Refund Swap</button>
  </div>
  <div class="card-row" style="font-size:11px;color:var(--color-white-50);margin-top:-2px;">
    <span style="width:auto;margin-right:14px;">btn-light</span>
    <span style="margin-right:14px;">btn-explorer</span>
    <span style="margin-right:14px;">btn-success</span>
    <span>btn-danger</span>
  </div>
  <div class="card-row" style="margin-top:4px; gap:8px;">
    <button class="b b-small">View</button>
    <button class="b b-small b-active">BTC</button>
    <button class="b b-small" style="background:var(--color-success-500);color:var(--color-text);">CLAIMED</button>
    <button class="b b-small" style="background:var(--color-error-500);color:var(--color-text);">EXPIRED</button>
    <span style="font-size:11px;color:var(--color-white-50);">btn-small · 8px radius, 24px tall</span>
  </div>
</div></body></html>
