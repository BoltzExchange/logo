<!doctype html>
<!-- @dsCard group="Colors" name="Primary (pro theme)" subtitle="Burnt-orange primary for Boltz Pro" viewport="700x200" -->
<html boltz-theme="pro">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(3, 1fr);">
    <div class="swatch"><div class="chip" style="background: var(--color-primary);"></div><div class="name">--color-primary</div><div class="hex">#C47835</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-primary-lighter);"></div><div class="name">--color-primary-lighter</div><div class="hex">#E8A268</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-btc-orange);"></div><div class="name">--color-btc-orange</div><div class="hex">#F7931A</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-primary-60);"></div><div class="name">--color-primary-60</div><div class="hex">60% mix</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-primary-glow);"></div><div class="name">--color-primary-glow</div><div class="hex">80% mix</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-tertiary);"></div><div class="name">--color-tertiary</div><div class="hex">#4F1D85</div></div>
  </div>
</div></body></html>
