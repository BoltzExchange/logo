<!doctype html>
<!-- @dsCard group="Colors" name="Secondary ramp (pro)" subtitle="Near-black 100→900 ramp for the trader surface" viewport="700x200" -->
<html boltz-theme="pro">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(8, 1fr);">
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-100);"></div><div class="name">100</div><div class="hex">#D7DEEC</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-200);"></div><div class="name">200</div><div class="hex">#C8CFD6</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-300);"></div><div class="name">300</div><div class="hex">#9FA8B1</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-500);"></div><div class="name">500</div><div class="hex">#1F262E</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-600);"></div><div class="name">600 · body</div><div class="hex">#14191E</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-700);"></div><div class="name">700 · card</div><div class="hex">#0D1216</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-800);"></div><div class="name">800 · input</div><div class="hex">#090D11</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-900);"></div><div class="name">900</div><div class="hex">#070A0E</div></div>
  </div>
  <div class="muted" style="font-size: 11.5px;">Pro theme — same structural roles, near-black hues for high-density trader UI.</div>
</div></body></html>
