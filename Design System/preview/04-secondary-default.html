<!doctype html>
<!-- @dsCard group="Colors" name="Secondary ramp (default)" subtitle="Dark-navy 100→900 ramp; 600 is body, 700 is cards" viewport="700x200" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(8, 1fr);">
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-100);"></div><div class="name">100</div><div class="hex">#D0D4D9</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-200);"></div><div class="name">200</div><div class="hex">#A1A9B2</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-300);"></div><div class="name">300</div><div class="hex">#727E8C</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-500);"></div><div class="name">500</div><div class="hex">#1E2D3C</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-600);"></div><div class="name">600 · body</div><div class="hex">#12253A</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-700);"></div><div class="name">700 · card</div><div class="hex">#0F1F30</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-800);"></div><div class="name">800 · input</div><div class="hex">#091625</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-secondary-900);"></div><div class="name">900</div><div class="hex">#09141F</div></div>
  </div>
  <div class="muted" style="font-size: 11.5px;">Default theme — body uses 600, nav &amp; cards use 700, deep surfaces use 800/900.</div>
</div></body></html>
