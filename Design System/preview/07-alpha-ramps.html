<!doctype html>
<!-- @dsCard group="Colors" name="Alpha ramps" subtitle="White & black opacity scales — never use raw rgba()" viewport="700x240" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card" style="background: var(--color-secondary-500);">
  <div class="label-upper">White alpha · use against dark surfaces</div>
  <div class="card-grid" style="grid-template-columns: repeat(9, 1fr); gap:6px;">
    <div class="swatch"><div class="chip" style="background: var(--color-white-05); height:36px;"></div><div class="hex">05</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-10); height:36px;"></div><div class="hex">10</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-15); height:36px;"></div><div class="hex">15</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-25); height:36px;"></div><div class="hex">25</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-30); height:36px;"></div><div class="hex">30</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-50); height:36px;"></div><div class="hex">50</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-60); height:36px;"></div><div class="hex">60</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-80); height:36px;"></div><div class="hex">80</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-white-90); height:36px;"></div><div class="hex">90</div></div>
  </div>
  <div class="label-upper" style="margin-top:6px;">Black alpha · use against light surfaces or for hover-dim</div>
  <div class="card-grid" style="grid-template-columns: repeat(9, 1fr); gap:6px;">
    <div class="swatch"><div class="chip" style="background: var(--color-black-10); height:36px; border-color: var(--color-white-25);"></div><div class="hex">10</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-black-20); height:36px; border-color: var(--color-white-25);"></div><div class="hex">20</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-black-30); height:36px; border-color: var(--color-white-25);"></div><div class="hex">30</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-black-40); height:36px; border-color: var(--color-white-25);"></div><div class="hex">40</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-black-50); height:36px; border-color: var(--color-white-25);"></div><div class="hex">50</div></div>
    <div style="grid-column: span 4;"></div>
  </div>
</div></body></html>
