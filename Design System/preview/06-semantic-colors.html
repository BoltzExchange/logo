<!doctype html>
<!-- @dsCard group="Colors" name="Semantic colors" subtitle="Link, text, medium-gray, success, error" viewport="700x240" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div class="card-grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch"><div class="chip" style="background: var(--color-link);"></div><div class="name">--color-link</div><div class="hex">#4FADC2</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-link-hover);"></div><div class="name">--color-link-hover</div><div class="hex">#70CDE2</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-text); color: var(--color-secondary-700); display:flex;align-items:center;justify-content:center;font-weight:700;">Aa</div><div class="name">--color-text</div><div class="hex">#D7DEE4</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-medium-gray);"></div><div class="name">--color-medium-gray</div><div class="hex">#545C65</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-success-500);"></div><div class="name">success-500</div><div class="hex">#246C24</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-success-400);"></div><div class="name">success-400</div><div class="hex">#419A41</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-error-700);"></div><div class="name">error-700</div><div class="hex">#530000</div></div>
    <div class="swatch"><div class="chip" style="background: var(--color-error-500);"></div><div class="name">error-500</div><div class="hex">#8B0000</div></div>
  </div>
</div></body></html>
