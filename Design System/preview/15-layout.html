<!doctype html>
<!-- @dsCard group="Spacing" name="Layout containers" subtitle="Max-widths & breakpoints used across surfaces" viewport="700x200" -->
<html boltz-theme="default">
<head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card">
  <div class="label-upper">Layout containers — max-width by surface</div>
  <div style="display:flex; flex-direction:column; gap: 10px; margin-top: 6px;">
    <div style="display:flex; align-items:center; gap: 12px;">
      <div style="width: 100%; max-width: 496px; height: 22px; background: var(--color-secondary-800); border: 1px solid var(--color-white-15); border-radius: 4px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--color-white-80); white-space:nowrap;">496px · swap frame</span>
    </div>
    <div style="display:flex; align-items:center; gap: 12px;">
      <div style="width: 100%; max-width: 600px; height: 22px; background: var(--color-secondary-800); border: 1px solid var(--color-white-15); border-radius: 4px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--color-white-80); white-space:nowrap;">~600px · settings / forms</span>
    </div>
    <div style="display:flex; align-items:center; gap: 12px;">
      <div style="width: 100%; height: 22px; background: var(--color-secondary-800); border: 1px solid var(--color-white-15); border-radius: 4px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--color-white-80); white-space:nowrap;">1024px · homepage inner-wrap</span>
    </div>
  </div>
  <div class="label-upper" style="margin-top: 4px;">Breakpoints</div>
  <div style="display:flex; gap: 18px; color: var(--color-white-80);">
    <span class="mono" style="font-size: 12px;">488px</span>
    <span class="muted" style="font-size: 12px;">small phones</span>
    <span class="mono" style="font-size: 12px;">768px</span>
    <span class="muted" style="font-size: 12px;">tablet / mobile breakpoint</span>
    <span class="mono" style="font-size: 12px;">1024px</span>
    <span class="muted" style="font-size: 12px;">desktop</span>
  </div>
</div></body></html>
